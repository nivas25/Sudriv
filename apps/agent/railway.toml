# Railway service config for the Sudriv voice agent
# Set Root Directory to: apps/agent
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# LiveKit Agents health server (WorkerOptions.port / $PORT)
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
