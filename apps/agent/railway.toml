# Railway service config for the Sudriv voice agent
# Set Root Directory to: apps/agent
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# LiveKit Agents health server (WorkerOptions.port / $PORT).
# Cold start: install layers are cached, but process prewarm loads Silero VAD
# and registers with LiveKit — 30s was too aggressive and caused restarts that
# re-dispatched jobs and re-greeted mid-session.
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
